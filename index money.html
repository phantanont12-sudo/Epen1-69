<script type="text/babel">
const{useState,useMemo,useEffect,useCallback}=React;
const N=88;
const DEFAULT_MENU=[
  {id:1,name:"น้ำดื่ม",price:7,emoji:"💧",cat:"เครื่องดื่ม",type:"snack"},
  {id:2,name:"น้ำอัดลม",price:15,emoji:"🥤",cat:"เครื่องดื่ม",type:"snack"},
  {id:3,name:"กาแฟกระป๋อง",price:20,emoji:"☕",cat:"เครื่องดื่ม",type:"snack"},

  {id:5,name:"ชาเขียว",price:20,emoji:"🍵",cat:"เครื่องดื่ม",type:"snack"},

  {id:7,name:"แซนด์วิช",price:35,emoji:"🥪",cat:"อาหาร",type:"snack"},
  {id:8,name:"ขนมปัง",price:25,emoji:"🥐",cat:"อาหาร",type:"snack"},
  {id:9,name:"ขนมจีบ/ซาลาเปา",price:15,emoji:"🥟",cat:"อาหาร",type:"snack"},
  {id:10,name:"ขนมถุง",price:20,emoji:"🍿",cat:"ขนม",type:"snack"},
  {id:11,name:"ขนมปังกรอบ",price:10,emoji:"🍪",cat:"ขนม",type:"snack"},
  {id:12,name:"ลูกอม/หมากฝรั่ง",price:5,emoji:"🍬",cat:"ขนม",type:"snack"},
  {id:13,name:"ไอศกรีม",price:15,emoji:"🍦",cat:"ขนม",type:"snack"},
  {id:14,name:"สบู่",price:35,emoji:"🧼",cat:"ของใช้",type:"essential"},
  {id:15,name:"ยาสีฟัน",price:30,emoji:"🪥",cat:"ของใช้",type:"essential"},
  {id:16,name:"แชมพู",price:25,emoji:"🧴",cat:"ของใช้",type:"essential"},
  {id:17,name:"ผงซักฟอก",price:20,emoji:"🫧",cat:"ของใช้",type:"essential"},
  {id:18,name:"กระดาษทิชชู่",price:15,emoji:"🧻",cat:"ของใช้",type:"essential"},
  {id:19,name:"ยาแก้ปวด",price:10,emoji:"💊",cat:"ยา/สุขภาพ",type:"essential"},
  {id:20,name:"พลาสเตอร์",price:15,emoji:"🩹",cat:"ยา/สุขภาพ",type:"essential"},
  {id:21,name:"ยาทาแผล",price:25,emoji:"🏥",cat:"ยา/สุขภาพ",type:"essential"},
  {id:22,name:"ใบมีดโกน",price:20,emoji:"🪒",cat:"ของใช้",type:"essential"},
  {id:23,name:"ถุงเท้า",price:30,emoji:"🧦",cat:"เครื่องแต่งกาย",type:"essential"},
];
const CATS=["ทั้งหมด","เครื่องดื่ม","อาหาร","ขนม","ของใช้","ยา/สุขภาพ","เครื่องแต่งกาย"];
const TYPES=[{key:"all",label:"ทั้งหมด"},{key:"snack",label:"🍿 ขนม"},{key:"essential",label:"🧴 ของจำเป็น"}];

const genSoldiers=()=>Array.from({length:N},(_,i)=>({id:i+1,name:`พลทหาร ${String(i+1).padStart(2,"0")}`,short:`พลฯ ${String(i+1).padStart(2,"0")}`}));
const fmtDate=d=>d.toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
const fmtTime=()=>new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const todayISO=()=>new Date().toISOString().split("T")[0];
const load=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

function App(){
  const[soldiers]=useState(genSoldiers);
  // balances: {1: 500, 2: 0, ...} — เงินฝากคงเหลือ (ติดลบ = หนี้)
  const[balances,setBalances]=useState(()=>load("bal",{}));
  const[menu,setMenu]=useState(()=>load("menu2",DEFAULT_MENU));
  const[transactions,setTx]=useState(()=>load("tx2",[]));
  const[page,setPage]=useState("dashboard");
  const[selSoldier,setSelSoldier]=useState(null);
  const[cart,setCart]=useState([]);
  const[search,setSearch]=useState("");
  const[dateFilter,setDateFilter]=useState(todayISO());
  const[menuCat,setMenuCat]=useState("ทั้งหมด");
  const[menuType,setMenuType]=useState("all");
  const[toast,setToast]=useState(null);
  const[modal,setModal]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const[clock,setClock]=useState(fmtTime());
  // Top-up & salary forms
  const[topupAmt,setTopupAmt]=useState("");
  const[topupNote,setTopupNote]=useState("");
  // Add menu
  const[showAddMenu,setShowAddMenu]=useState(false);
  const[newItem,setNewItem]=useState({name:"",price:"",emoji:"🍪",cat:"ขนม",type:"snack"});
  const[editItem,setEditItem]=useState(null);
  // Batch deposit
  const[batchAmt,setBatchAmt]=useState("");

  useEffect(()=>{const t=setInterval(()=>setClock(fmtTime()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{save("tx2",transactions)},[transactions]);
  useEffect(()=>{save("menu2",menu)},[menu]);
  useEffect(()=>{save("bal",balances)},[balances]);

  const notify=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800)};
  const today=todayISO();

  const getBal=id=>balances[id]||0;
  const dayTx=useMemo(()=>transactions.filter(t=>t.date===dateFilter),[transactions,dateFilter]);
  const todayTx=useMemo(()=>transactions.filter(t=>t.date===today),[transactions,today]);

  // Stats
  const totalDeposits=useMemo(()=>Object.values(balances).reduce((s,v)=>s+(v>0?v:0),0),[balances]);
  const totalDebt=useMemo(()=>Object.values(balances).reduce((s,v)=>s+(v<0?Math.abs(v):0),0),[balances]);
  const debtCount=useMemo(()=>Object.values(balances).filter(v=>v<0).length,[balances]);
  const todaySpent=todayTx.filter(t=>t.action==="purchase").reduce((s,t)=>s+t.total,0);
  const todaySnack=todayTx.filter(t=>t.action==="purchase"&&t.itemType==="snack").reduce((s,t)=>s+t.total,0);
  const todayEssential=todayTx.filter(t=>t.action==="purchase"&&t.itemType==="essential").reduce((s,t)=>s+t.total,0);

  // Cart
  const cartTotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const addToCart=item=>{
    if(!selSoldier)return notify("⚠️ กรุณาเลือกทหารก่อน","error");
    setCart(p=>{const ex=p.find(c=>c.id===item.id);return ex?p.map(c=>c.id===item.id?{...c,qty:c.qty+1}:c):[...p,{...item,qty:1}]});
  };
  const removeFromCart=id=>setCart(p=>{const it=p.find(c=>c.id===id);return it?.qty>1?p.map(c=>c.id===id?{...c,qty:c.qty-1}:c):p.filter(c=>c.id!==id)});

  const confirmPurchase=()=>{
    if(!selSoldier||!cart.length)return;
    const bal=getBal(selSoldier.id);
    const willBeNeg=bal-cartTotal<0;
    const hasSnack=cart.some(c=>c.type==="snack");
    const hasEssential=cart.some(c=>c.type==="essential");
    const itemType=hasSnack&&hasEssential?"mixed":hasSnack?"snack":"essential";
    setModal({title:"ยืนยันการซื้อ",msg:`${selSoldier.name}\nรวม ฿${cartTotal}\nยอดเงินคงเหลือหลังซื้อ: ฿${bal-cartTotal}${willBeNeg?"\n⚠️ จะติดหนี้ — หักจากเงินเดือนภายหลัง":""}`,
      onConfirm:()=>{
        setBalances(p=>({...p,[selSoldier.id]:(p[selSoldier.id]||0)-cartTotal}));
        setTx(p=>[...p,{id:Date.now(),soldierId:selSoldier.id,soldierName:selSoldier.name,action:"purchase",items:[...cart],total:cartTotal,itemType,date:today,time:fmtTime()}]);
        setCart([]);setModal(null);
        notify(`✅ ${selSoldier.name} — ฿${cartTotal}${willBeNeg?" (ติดหนี้)":""}`);
      }
    });
  };

  // Top-up deposit
  const doTopup=()=>{
    if(!selSoldier||!topupAmt)return;
    const amt=Number(topupAmt);if(amt<=0)return notify("กรุณากรอกจำนวนเงิน","error");
    setBalances(p=>({...p,[selSoldier.id]:(p[selSoldier.id]||0)+amt}));
    setTx(p=>[...p,{id:Date.now(),soldierId:selSoldier.id,soldierName:selSoldier.name,action:"topup",total:amt,note:topupNote||"ฝากเงิน",date:today,time:fmtTime()}]);
    setTopupAmt("");setTopupNote("");
    notify(`✅ ฝากเงิน ${selSoldier.name} ฿${amt} สำเร็จ`);
  };

  // Salary payback
  const doSalaryPayback=(soldier)=>{
    const debt=Math.abs(getBal(soldier.id));
    if(debt<=0)return notify("ไม่มียอดค้างชำระ","info");
    setModal({title:"หักเงินเดือนชำระหนี้",msg:`${soldier.name}\nยอดหนี้ค้างชำระ: ฿${debt}\nต้องการหักเงินเดือนเพื่อชำระหนี้ทั้งหมดหรือไม่?`,
      onConfirm:()=>{
        setBalances(p=>({...p,[soldier.id]:0}));
        setTx(p=>[...p,{id:Date.now(),soldierId:soldier.id,soldierName:soldier.name,action:"salary",total:debt,note:"หักเงินเดือนชำระหนี้",date:today,time:fmtTime()}]);
        setModal(null);notify(`✅ ชำระหนี้ ${soldier.name} ฿${debt} จากเงินเดือน`);
      }
    });
  };

  // Batch deposit
  const doBatchDeposit=()=>{
    const amt=Number(batchAmt);if(!amt||amt<=0)return notify("กรุณากรอกจำนวนเงิน","error");
    setModal({title:"ฝากเงินทั้งหมด",msg:`ฝากเงิน ฿${amt} ให้ทหารทั้ง ${N} นาย\nรวมทั้งหมด ฿${(amt*N).toLocaleString()}`,
      onConfirm:()=>{
        const newBal={...balances};const batch=[];
        soldiers.forEach(s=>{newBal[s.id]=(newBal[s.id]||0)+amt;batch.push({id:Date.now()+s.id,soldierId:s.id,soldierName:s.name,action:"topup",total:amt,note:`ฝากเงินรอบ (฿${amt}/คน)`,date:today,time:fmtTime()})});
        setBalances(newBal);setTx(p=>[...p,...batch]);setBatchAmt("");setModal(null);
        notify(`✅ ฝากเงิน ฿${amt} × ${N} นาย สำเร็จ`);
      }
    });
  };

  const filteredSoldiers=soldiers.filter(s=>s.name.includes(search)||String(s.id).includes(search));
  const filteredMenu=useMemo(()=>{
    let m=menu;
    if(menuType!=="all")m=m.filter(x=>x.type===menuType);
    if(menuCat!=="ทั้งหมด")m=m.filter(x=>x.cat===menuCat);
    return m;
  },[menu,menuType,menuCat]);

  // Popular & top
  const topSpenders=useMemo(()=>{const m={};dayTx.filter(t=>t.action==="purchase").forEach(t=>{m[t.soldierId]=(m[t.soldierId]||0)+t.total});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,amt])=>({soldier:soldiers.find(s=>s.id===Number(id)),amount:amt}))},[dayTx,soldiers]);
  const debtors=useMemo(()=>soldiers.filter(s=>getBal(s.id)<0).sort((a,b)=>getBal(a.id)-getBal(b.id)),[balances,soldiers]);

  const NAV=[
    {key:"dashboard",icon:"📊",label:"แดชบอร์ด"},
    {key:"purchase",icon:"🛒",label:"ซื้อของ"},
    {key:"deposit",icon:"💰",label:"ฝากเงิน/ชำระหนี้"},
    {key:"soldiers",icon:"👥",label:"บัญชีทหาร"},
    {key:"history",icon:"📋",label:"ประวัติ"},
    {key:"settings",icon:"⚙️",label:"ตั้งค่า"},
  ];

  return(
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'Sarabun',sans-serif"}}>
      {toast&&<div className={`toast ${toast.type}`}>{toast.msg}</div>}
      {modal&&<div className="modal-overlay"><div className="modal-box"><h3 className="modal-title">{modal.title}</h3><p className="modal-msg" style={{whiteSpace:"pre-line"}}>{modal.msg}</p><div className="modal-actions"><button className="btn-cancel" onClick={()=>setModal(null)}>ยกเลิก</button><button className="btn-confirm" onClick={modal.onConfirm}>ยืนยัน</button></div></div></div>}

      {/* SIDEBAR */}
      <aside className={`sidebar ${sidebarOpen?"open":"closed"}`}>
        <div className="sidebar-header"><div className="logo-area"><div className="logo-icon">🪖</div>{sidebarOpen&&<div><div className="logo-title">ระบบบัญชีค่าใช้จ่าย</div><div className="logo-sub">ช.1 พัน.52 • ทหาร {N} นาย</div></div>}</div><button className="sidebar-toggle" onClick={()=>setSidebarOpen(!sidebarOpen)}>{sidebarOpen?"◀":"▶"}</button></div>
        <nav className="sidebar-nav">{NAV.map(n=><button key={n.key} className={`nav-item ${page===n.key?"active":""}`} onClick={()=>setPage(n.key)}><span className="nav-icon">{n.icon}</span>{sidebarOpen&&<span className="nav-label">{n.label}</span>}</button>)}</nav>
        {sidebarOpen&&<div className="sidebar-footer"><div className="clock">{clock}</div><div className="sidebar-date">{fmtDate(new Date())}</div></div>}
      </aside>
      <div className="mobile-nav"><div className="mobile-nav-inner">{NAV.map(n=><button key={n.key} className={`mobile-nav-btn ${page===n.key?"active":""}`} onClick={()=>setPage(n.key)}><span className="mn-icon">{n.icon}</span>{n.label}</button>)}</div></div>

      {/* MAIN */}
      <main className="main-content">
        <header className="topbar">
          <div><h1 className="page-title">{NAV.find(n=>n.key===page)?.icon} {NAV.find(n=>n.key===page)?.label}</h1></div>
          <div className="topbar-right">
            <div className="mini-stat"><span className="mini-label">เงินฝากรวม</span><span className="mini-val green">฿{totalDeposits.toLocaleString()}</span></div>
            <div className="mini-stat"><span className="mini-label">หนี้รวม</span><span className="mini-val red">฿{totalDebt.toLocaleString()}</span></div>
            <div className="mini-stat"><span className="mini-label">จ่ายวันนี้</span><span className="mini-val orange">฿{todaySpent.toLocaleString()}</span></div>
          </div>
        </header>

        <div className="page-content">

{/* ==================== DASHBOARD ==================== */}
{page==="dashboard"&&<div className="fade-in">
  <div className="stat-grid">
    <div className="dash-card accent-green"><div className="dc-icon">💰</div><div><div className="dc-label">เงินฝากรวม</div><div className="dc-val" style={{color:"var(--green)"}}>฿{totalDeposits.toLocaleString()}</div></div></div>
    <div className="dash-card accent-red"><div className="dc-icon">📕</div><div><div className="dc-label">หนี้ค้างชำระ</div><div className="dc-val" style={{color:"var(--red)"}}>฿{totalDebt.toLocaleString()}</div></div></div>
    <div className="dash-card accent-orange"><div className="dc-icon">🛒</div><div><div className="dc-label">จ่ายวันนี้</div><div className="dc-val" style={{color:"var(--orange)"}}>฿{todaySpent.toLocaleString()}</div></div></div>
    <div className="dash-card accent-gold"><div className="dc-icon">🍿</div><div><div className="dc-label">ขนมวันนี้</div><div className="dc-val" style={{color:"var(--gold)"}}>฿{todaySnack.toLocaleString()}</div></div></div>
    <div className="dash-card accent-blue"><div className="dc-icon">🧴</div><div><div className="dc-label">ของจำเป็นวันนี้</div><div className="dc-val" style={{color:"var(--blue)"}}>฿{todayEssential.toLocaleString()}</div></div></div>
    <div className="dash-card accent-purple"><div className="dc-icon">⚠️</div><div><div className="dc-label">คนติดหนี้</div><div className="dc-val" style={{color:"var(--red)"}}>{debtCount} / {N} นาย</div></div></div>
  </div>

  <div className="grid-2 mt16">
    <div className="card"><div className="card-title">⚠️ รายชื่อติดหนี้ ({debtors.length} นาย)</div>
      {debtors.length===0?<div className="empty-state"><p>ไม่มีทหารติดหนี้</p></div>:
      <div className="tx-table-wrap" style={{maxHeight:250}}><table className="tx-table"><thead><tr><th>ลำดับ</th><th>ชื่อ</th><th>ยอดหนี้</th><th>ชำระ</th></tr></thead><tbody>
        {debtors.map(s=><tr key={s.id}><td>{s.id}</td><td>{s.name}</td><td style={{color:"var(--red)",fontWeight:700}}>฿{Math.abs(getBal(s.id)).toLocaleString()}</td><td><button className="btn-outline-gold" style={{fontSize:10,padding:"2px 8px"}} onClick={()=>doSalaryPayback(s)}>หักเงินเดือน</button></td></tr>)}
      </tbody></table></div>}
    </div>
    <div className="card"><div className="card-title">🏆 ใช้จ่ายมากสุดวันนี้</div>
      {topSpenders.length===0?<div className="empty-state"><p>ยังไม่มีข้อมูล</p></div>:
      topSpenders.map((e,i)=><div key={i} className="rank-row"><span style={{fontSize:18,width:28,textAlign:"center"}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span><span className="rank-name">{e.soldier?.name}</span><span className="rank-amt" style={{color:"var(--gold)"}}>฿{e.amount}</span></div>)}
    </div>
  </div>

  <div className="card mt16"><div className="card-title">🕐 รายการล่าสุดวันนี้</div>
    {todayTx.length===0?<div className="empty-state"><p>ยังไม่มีรายการ</p></div>:
    <div className="tx-table-wrap" style={{maxHeight:300}}><table className="tx-table"><thead><tr><th>เวลา</th><th>ชื่อ</th><th>ประเภท</th><th>รายละเอียด</th><th>จำนวน</th></tr></thead><tbody>
      {[...todayTx].reverse().slice(0,15).map(tx=><tr key={tx.id}>
        <td style={{fontSize:11,color:"var(--text3)"}}>{tx.time}</td>
        <td style={{fontWeight:600}}>{tx.soldierName}</td>
        <td>{tx.action==="purchase"?tx.itemType==="snack"?<span className="tag-snack">ขนม</span>:tx.itemType==="essential"?<span className="tag-essential">ของจำเป็น</span>:<span className="tag-snack">ขนม+ของจำเป็น</span>:tx.action==="topup"?<span className="tag-topup">ฝากเงิน</span>:<span className="tag-salary">หักเงินเดือน</span>}</td>
        <td style={{fontSize:11}}>{tx.items?tx.items.map(i=>`${i.emoji}${i.name}×${i.qty}`).join(", "):tx.note}</td>
        <td style={{fontWeight:700,color:tx.action==="purchase"?"var(--orange)":"var(--green)"}}>
          {tx.action==="purchase"?`-฿${tx.total}`:tx.action==="topup"?`+฿${tx.total}`:`+฿${tx.total}`}
        </td>
      </tr>)}
    </tbody></table></div>}
  </div>
</div>}

{/* ==================== PURCHASE ==================== */}
{page==="purchase"&&<div className="purchase-layout fade-in">
  <div className="card">
    <div className="card-title">👤 เลือกทหาร</div>
    <input className="search-input" placeholder="🔍 ค้นหา..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <div className="soldier-list">{filteredSoldiers.map(s=>{const b=getBal(s.id);return(
      <button key={s.id} className={`soldier-btn ${selSoldier?.id===s.id?"selected":""} ${b<0?"debt":""}`} onClick={()=>{setSelSoldier(s);setCart([])}}>
        <span className="sb-num">{String(s.id).padStart(2,"0")}</span>
        <span className="sb-bal" style={{color:b<0?"var(--red)":b>0?"var(--green)":"var(--text3)"}}>฿{b}</span>
      </button>)})}</div>
    {selSoldier&&<div className="soldier-detail-card">
      <div className="sd-name">🎖️ {selSoldier.name}</div>
      <div className="sd-row"><span className="sd-label">เงินฝากคงเหลือ</span><span className="sd-val" style={{color:getBal(selSoldier.id)>=0?"var(--green)":"var(--red)"}}>฿{getBal(selSoldier.id).toLocaleString()}</span></div>
      <div className="sd-row"><span className="sd-label">สถานะ</span><span>{getBal(selSoldier.id)<0?<span className="badge red-bg">ติดหนี้</span>:getBal(selSoldier.id)>0?<span className="badge green-bg">มีเงินฝาก</span>:<span className="badge grey">ไม่มีเงินฝาก</span>}</span></div>
      {getBal(selSoldier.id)<0&&<div style={{fontSize:11,color:"var(--red)",marginTop:4}}>⚠️ ซื้อเพิ่มได้ — จะหักจากเงินเดือน</div>}
    </div>}
  </div>

  <div className="card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
      <div className="card-title" style={{margin:0}}>🛒 สินค้า</div>
    </div>
    <div className="cat-tabs">{TYPES.map(t=><button key={t.key} className={`cat-tab ${menuType===t.key?"active":""}`} onClick={()=>setMenuType(t.key)}>{t.label}</button>)}</div>
    <div className="cat-tabs">{CATS.map(c=><button key={c} className={`cat-tab ${menuCat===c?"active":""}`} onClick={()=>setMenuCat(c)}>{c}</button>)}</div>
    <div className="menu-grid">{filteredMenu.map(item=>(
      <button key={item.id} className={`menu-card ${item.type==="essential"?"essential":""}`} onClick={()=>addToCart(item)}>
        <span className="mc-emoji">{item.emoji}</span><span className="mc-name">{item.name}</span>
        <span className="mc-price">฿{item.price}</span>
        <span style={{fontSize:8,color:item.type==="essential"?"var(--blue)":"var(--text3)"}}>{item.type==="essential"?"ของจำเป็น":"ขนม"}</span>
      </button>))}</div>
  </div>

  <div className="card">
    <div className="card-title">🧾 ตะกร้า {selSoldier?`— ${selSoldier.short}`:""}</div>
    {cart.length===0?<div className="empty-state"><span style={{fontSize:40}}>🛒</span><p>เลือกทหาร แล้วกดสินค้า</p></div>:(
      <React.Fragment>
        <div className="cart-items">{cart.map(c=><div key={c.id} className="cart-row"><span className="cr-name">{c.emoji} {c.name}</span><div className="cr-qty"><button className="qty-btn" onClick={()=>removeFromCart(c.id)}>−</button><span className="qty-num">{c.qty}</span><button className="qty-btn" onClick={()=>addToCart(c)}>+</button></div><span className="cr-price">฿{c.price*c.qty}</span></div>)}</div>
        <div style={{marginTop:10,borderTop:"1px solid var(--border)",paddingTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}><span>ขนม</span><span>฿{cart.filter(c=>c.type==="snack").reduce((s,c)=>s+c.price*c.qty,0)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}><span>ของจำเป็น</span><span>฿{cart.filter(c=>c.type==="essential").reduce((s,c)=>s+c.price*c.qty,0)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:600}}>รวม</span><span style={{fontFamily:"'Kanit'",fontSize:22,fontWeight:800,color:"var(--gold)"}}>฿{cartTotal}</span></div>
          {selSoldier&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>ยอดคงเหลือหลังซื้อ: <span style={{fontWeight:700,color:getBal(selSoldier.id)-cartTotal<0?"var(--red)":"var(--green)"}}>฿{(getBal(selSoldier.id)-cartTotal).toLocaleString()}</span></div>}
          <button className="btn-green" style={{width:"100%",marginBottom:4}} onClick={confirmPurchase}>✅ ยืนยันการซื้อ</button>
          <button className="btn-cancel" style={{width:"100%",fontSize:11,padding:4,textAlign:"center"}} onClick={()=>setCart([])}>ล้างตะกร้า</button>
        </div>
      </React.Fragment>
    )}
  </div>
</div>}

{/* ==================== DEPOSIT ==================== */}
{page==="deposit"&&<div className="fade-in" style={{maxWidth:800}}>
  <div className="card">
    <div className="card-title">💰 ฝากเงินรายคน</div>
    <div className="form-row">
      <div className="form-field" style={{flex:2}}><label className="form-label">เลือกทหาร</label>
        <select className="form-input" value={selSoldier?.id||""} onChange={e=>{const s=soldiers.find(x=>x.id===Number(e.target.value));setSelSoldier(s||null)}}>
          <option value="">-- เลือกทหาร --</option>{soldiers.map(s=><option key={s.id} value={s.id}>{s.name} (฿{getBal(s.id)})</option>)}
        </select>
      </div>
      <div className="form-field"><label className="form-label">จำนวนเงิน (฿)</label><input className="form-input" type="number" placeholder="0" value={topupAmt} onChange={e=>setTopupAmt(e.target.value)}/></div>
      <div className="form-field" style={{flex:2}}><label className="form-label">หมายเหตุ</label><input className="form-input" placeholder="เช่น ฝากค่าขนม" value={topupNote} onChange={e=>setTopupNote(e.target.value)}/></div>
      <button className="btn-green" onClick={doTopup}>ฝากเงิน</button>
    </div>
    {selSoldier&&<div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>ยอดปัจจุบัน {selSoldier.name}: <span style={{fontWeight:700,color:getBal(selSoldier.id)>=0?"var(--green)":"var(--red)"}}>฿{getBal(selSoldier.id).toLocaleString()}</span></div>}
  </div>

  <div className="card mt16">
    <div className="card-title">📦 ฝากเงินทั้งหมด {N} นาย (รอบเดียว)</div>
    <div className="form-row">
      <div className="form-field"><label className="form-label">จำนวนเงินต่อคน (฿)</label><input className="form-input" type="number" placeholder="0" value={batchAmt} onChange={e=>setBatchAmt(e.target.value)}/></div>
      <div style={{fontSize:13,color:"var(--text3)",paddingBottom:4}}>รวม: ฿{(Number(batchAmt||0)*N).toLocaleString()}</div>
      <button className="btn-blue" onClick={doBatchDeposit}>ฝากทั้งหมด</button>
    </div>
  </div>

  <div className="card mt16">
    <div className="card-title">⚠️ ชำระหนี้จากเงินเดือน ({debtors.length} นาย ติดหนี้ รวม ฿{totalDebt.toLocaleString()})</div>
    {debtors.length===0?<div className="empty-state"><p>ไม่มีทหารติดหนี้</p></div>:
    <React.Fragment>
      <button className="btn-danger" style={{marginBottom:10}} onClick={()=>{if(!debtors.length)return;setModal({title:"หักเงินเดือนทั้งหมด",msg:`ชำระหนี้ ${debtors.length} นาย รวม ฿${totalDebt.toLocaleString()} จากเงินเดือน?`,onConfirm:()=>{const nb={...balances};const batch=[];debtors.forEach(s=>{const d=Math.abs(getBal(s.id));nb[s.id]=0;batch.push({id:Date.now()+s.id,soldierId:s.id,soldierName:s.name,action:"salary",total:d,note:"หักเงินเดือนชำระหนี้",date:today,time:fmtTime()})});setBalances(nb);setTx(p=>[...p,...batch]);setModal(null);notify(`✅ ชำระหนี้ ${debtors.length} นาย สำเร็จ`)}})}}>หักเงินเดือนทั้งหมด</button>
      <div className="tx-table-wrap"><table className="tx-table"><thead><tr><th>#</th><th>ชื่อ</th><th>ยอดหนี้</th><th>ชำระ</th></tr></thead><tbody>
        {debtors.map(s=><tr key={s.id}><td>{s.id}</td><td>{s.name}</td><td style={{color:"var(--red)",fontWeight:700}}>฿{Math.abs(getBal(s.id)).toLocaleString()}</td><td><button className="btn-outline-gold" style={{fontSize:10,padding:"2px 8px"}} onClick={()=>doSalaryPayback(s)}>หักเงินเดือน</button></td></tr>)}
      </tbody></table></div>
    </React.Fragment>}
  </div>
</div>}

{/* ==================== SOLDIERS ==================== */}
{page==="soldiers"&&<div className="fade-in">
  <div className="card"><div className="card-title">👥 บัญชีทหาร {N} นาย (เงินฝากคงเหลือ)</div>
    <div className="tx-table-wrap" style={{maxHeight:600}}><table className="tx-table"><thead><tr><th>ลำดับ</th><th>ชื่อ</th><th>เงินฝาก</th><th>ซื้อวันนี้</th><th>สถานะ</th></tr></thead><tbody>
      {soldiers.map(s=>{const b=getBal(s.id);const sp=todayTx.filter(t=>t.soldierId===s.id&&t.action==="purchase").reduce((x,t)=>x+t.total,0);return(
        <tr key={s.id}><td>{s.id}</td><td style={{fontWeight:600}}>{s.name}</td>
        <td style={{fontWeight:700,color:b>0?"var(--green)":b<0?"var(--red)":"var(--text3)"}}>฿{b.toLocaleString()}</td>
        <td style={{color:sp>0?"var(--orange)":"var(--text3)"}}>฿{sp}</td>
        <td>{b<0?<span className="badge red-bg">ติดหนี้ ฿{Math.abs(b)}</span>:b>0?<span className="badge green-bg">มีเงินฝาก</span>:<span className="badge grey">ไม่มีเงินฝาก</span>}</td></tr>)})}
    </tbody></table></div>
  </div>
</div>}

{/* ==================== HISTORY ==================== */}
{page==="history"&&<div className="fade-in"><div className="card">
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
    <div className="card-title" style={{margin:0}}>📋 ประวัติรายการ</div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}><input type="date" className="date-input" value={dateFilter} onChange={e=>setDateFilter(e.target.value)}/><span style={{fontSize:12,color:"var(--text3)"}}>{dayTx.length} รายการ</span></div>
  </div>
  {dayTx.length===0?<div className="empty-state" style={{padding:40}}><span style={{fontSize:50}}>📭</span><p>ไม่มีรายการ</p></div>:
  <div className="tx-table-wrap"><table className="tx-table"><thead><tr><th>#</th><th>เวลา</th><th>ชื่อ</th><th>ประเภท</th><th>รายละเอียด</th><th>จำนวนเงิน</th><th></th></tr></thead><tbody>
    {[...dayTx].reverse().map((tx,idx)=><tr key={tx.id}>
      <td>{dayTx.length-idx}</td>
      <td style={{fontSize:11,color:"var(--text3)"}}>{tx.time}</td>
      <td style={{fontWeight:600}}>{tx.soldierName}</td>
      <td>{tx.action==="purchase"?tx.itemType==="snack"?<span className="tag-snack">ขนม</span>:tx.itemType==="essential"?<span className="tag-essential">ของจำเป็น</span>:<span className="tag-snack">ขนม+ของจำเป็น</span>:tx.action==="topup"?<span className="tag-topup">ฝากเงิน</span>:<span className="tag-salary">เงินเดือน</span>}</td>
      <td style={{fontSize:11}}>{tx.items?tx.items.map(i=>`${i.emoji}${i.name}×${i.qty}`).join(", "):tx.note}</td>
      <td style={{fontWeight:700,color:tx.action==="purchase"?"var(--red)":"var(--green)"}}>{tx.action==="purchase"?`-฿${tx.total}`:`+฿${tx.total}`}</td>
      <td><button className="btn-del-sm" onClick={()=>setModal({title:"ลบรายการ",msg:"ต้องการลบรายการนี้? ยอดเงินจะไม่ถูกปรับคืนอัตโนมัติ",onConfirm:()=>{setTx(p=>p.filter(t=>t.id!==tx.id));setModal(null);notify("🗑️ ลบสำเร็จ")}})}>🗑️</button></td>
    </tr>)}
  </tbody></table></div>}
</div></div>}

{/* ==================== SETTINGS ==================== */}
{page==="settings"&&<div className="fade-in" style={{maxWidth:700}}>
  <div className="card">
    <div className="card-title">🍿 จัดการสินค้า ({menu.length} รายการ)</div>
    <button className="btn-outline-gold" style={{marginBottom:10}} onClick={()=>{setShowAddMenu(!showAddMenu);setEditItem(null)}}>+ เพิ่มสินค้าใหม่</button>
    {showAddMenu&&<div style={{background:"rgba(16,185,129,.04)",border:"1px solid rgba(16,185,129,.15)",borderRadius:10,padding:12,marginBottom:10}}>
      <div style={{fontFamily:"'Kanit'",fontSize:13,fontWeight:700,color:"var(--green)",marginBottom:8}}>➕ เพิ่มสินค้า</div>
      <div className="form-row">
        <div className="form-field" style={{flex:0,minWidth:50}}><label className="form-label">Emoji</label><input className="form-input" value={newItem.emoji} onChange={e=>setNewItem(p=>({...p,emoji:e.target.value}))}/></div>
        <div className="form-field" style={{flex:2}}><label className="form-label">ชื่อ</label><input className="form-input" value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-field" style={{flex:0,minWidth:70}}><label className="form-label">ราคา</label><input className="form-input" type="number" value={newItem.price} onChange={e=>setNewItem(p=>({...p,price:e.target.value}))}/></div>
        <div className="form-field"><label className="form-label">หมวดหมู่</label><select className="form-input" value={newItem.cat} onChange={e=>setNewItem(p=>({...p,cat:e.target.value}))}>{CATS.filter(c=>c!=="ทั้งหมด").map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="form-field"><label className="form-label">ประเภท</label><select className="form-input" value={newItem.type} onChange={e=>setNewItem(p=>({...p,type:e.target.value}))}><option value="snack">ขนม</option><option value="essential">ของจำเป็น</option></select></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn-cancel" onClick={()=>setShowAddMenu(false)}>ยกเลิก</button><button className="btn-confirm" onClick={()=>{if(!newItem.name||!newItem.price)return notify("กรุณากรอกข้อมูล","error");setMenu(p=>[...p,{id:Date.now(),...newItem,price:Number(newItem.price)}]);setNewItem({name:"",price:"",emoji:"🍪",cat:"ขนม",type:"snack"});setShowAddMenu(false);notify("✅ เพิ่มสำเร็จ")}}>เพิ่ม</button></div>
    </div>}
    <div className="tx-table-wrap" style={{maxHeight:500}}><table className="tx-table"><thead><tr><th>สินค้า</th><th>ราคา</th><th>หมวดหมู่</th><th>ประเภท</th><th>จัดการ</th></tr></thead><tbody>
      {menu.map(item=>editItem?.id===item.id?(
        <tr key={item.id}><td colSpan={5}><div style={{background:"rgba(245,158,11,.04)",border:"1px solid rgba(245,158,11,.15)",borderRadius:8,padding:10}}>
          <div className="form-row" style={{marginBottom:6}}>
            <div className="form-field" style={{flex:0,minWidth:50}}><input className="form-input" value={editItem.emoji} onChange={e=>setEditItem(p=>({...p,emoji:e.target.value}))}/></div>
            <div className="form-field" style={{flex:2}}><input className="form-input" value={editItem.name} onChange={e=>setEditItem(p=>({...p,name:e.target.value}))}/></div>
            <div className="form-field" style={{flex:0,minWidth:70}}><input className="form-input" type="number" value={editItem.price} onChange={e=>setEditItem(p=>({...p,price:e.target.value}))}/></div>
            <div className="form-field"><select className="form-input" value={editItem.cat} onChange={e=>setEditItem(p=>({...p,cat:e.target.value}))}>{CATS.filter(c=>c!=="ทั้งหมด").map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="form-field"><select className="form-input" value={editItem.type} onChange={e=>setEditItem(p=>({...p,type:e.target.value}))}><option value="snack">ขนม</option><option value="essential">ของจำเป็น</option></select></div>
          </div>
          <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}><button className="btn-cancel" style={{fontSize:11,padding:"4px 12px"}} onClick={()=>setEditItem(null)}>ยกเลิก</button><button className="btn-confirm" style={{fontSize:11,padding:"4px 12px"}} onClick={()=>{setMenu(p=>p.map(m=>m.id===editItem.id?{...editItem,price:Number(editItem.price)}:m));setEditItem(null);notify("✅ แก้ไขสำเร็จ")}}>💾 บันทึก</button></div>
        </div></td></tr>
      ):(
        <tr key={item.id}><td>{item.emoji} {item.name}</td><td style={{color:"var(--gold)",fontWeight:700}}>฿{item.price}</td><td><span className="badge grey">{item.cat}</span></td><td>{item.type==="essential"?<span className="badge blue-bg">ของจำเป็น</span>:<span className="badge gold-bg">ขนม</span>}</td><td><button className="btn-edit-sm" onClick={()=>{setEditItem({...item});setShowAddMenu(false)}}>✏️</button> <button className="btn-del-sm" onClick={()=>setModal({title:"ลบสินค้า",msg:`ลบ "${item.name}"?`,onConfirm:()=>{setMenu(p=>p.filter(m=>m.id!==item.id));setModal(null);notify("🗑️ ลบสำเร็จ")}})}>🗑️</button></td></tr>
      ))}
    </tbody></table></div>
  </div>

  <div className="card mt16">
    <div className="card-title">🗃️ จัดการข้อมูล</div>
    <div className="setting-row"><span className="setting-label">🗑️ ล้างรายการวันนี้</span><button className="btn-danger" onClick={()=>setModal({title:"ล้างวันนี้",msg:"ล้างรายการวันนี้? (ยอดเงินจะไม่ถูกปรับคืน)",onConfirm:()=>{setTx(p=>p.filter(t=>t.date!==today));setModal(null);notify("✅ ล้างแล้ว")}})}>ล้างวันนี้</button></div>
    <div className="setting-row"><span className="setting-label">⚠️ รีเซ็ตยอดเงินทั้งหมดเป็น 0</span><button className="btn-danger" onClick={()=>setModal({title:"รีเซ็ตยอดเงิน",msg:"ยอดเงินทหารทุกคนจะถูกตั้งเป็น ฿0",onConfirm:()=>{setBalances({});setModal(null);notify("✅ รีเซ็ตสำเร็จ")}})}>รีเซ็ต</button></div>
    <div className="setting-row"><span className="setting-label">⚠️ ล้างข้อมูลทั้งหมด</span><button className="btn-danger" onClick={()=>setModal({title:"ล้างทั้งหมด",msg:"ลบรายการ + ยอดเงินทั้งหมด?",onConfirm:()=>{setTx([]);setBalances({});setModal(null);notify("✅ ล้างทั้งหมดสำเร็จ")}})}>ล้างทั้งหมด</button></div>
  </div>
</div>}

        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
